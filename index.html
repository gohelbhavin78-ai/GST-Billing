<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Billing System</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

    <style>
        body {
            background: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        fieldset {
            margin-bottom: 25px;
        }

        input[readonly],
        textarea[readonly] {
            background: #f3f3f3;
        }

        table input,
        table select {
            margin: 0;
        }

        tfoot input {
            font-weight: bold;
        }

        .btn {
            text-align: center;
            margin-top: 20px;
        }
    </style>

</head>

<body>

<div class="container">

<h2>GST Invoice Entry</h2>

<form id="invoiceForm">

<!---------------- Invoice Details ---------------->

<fieldset>

<legend><strong>Invoice Details</strong></legend>

<div class="grid">

<label>
Invoice Number
<input
type="text"
id="invoiceNo"
readonly>
</label>

<label>
Invoice Date
<input
type="date"
id="invoiceDate">
</label>

</div>

</fieldset>

<!---------------- Customer Details ---------------->

<fieldset>

<legend><strong>Customer Details</strong></legend>

<div class="grid">

<label>

Select Customer

<select id="customerSelect">

<option value="">
Loading Customers...
</option>

</select>

</label>

<label>

GSTIN

<input
type="text"
id="customerGST"
readonly>

</label>

</div>

<label>

Customer Address

<textarea
id="customerAddress"
rows="3"
readonly></textarea>

</label>

</fieldset>

<!---------------- Product Details ---------------->

<fieldset>

<legend><strong>Product Details</strong></legend>

<table>

<thead>

<tr>

<th width="30%">Product</th>

<th>HSN</th>

<th>GST%</th>

<th>Rate</th>

<th>Qty</th>

<th>Amount</th>

</tr>

</thead>

<tbody>

<tr>

<td>

<select id="productSelect">

<option value="">
Loading Products...
</option>

</select>

</td>

<td>

<input
type="text"
id="hsn"
readonly>

</td>

<td>

<input
type="number"
id="gstRate"
readonly>

</td>

<td>

<input
type="number"
id="rate"
readonly>

</td>

<td>

<input
type="number"
id="qty"
min="1"
value="1">

</td>

<td>

<input
type="number"
id="amount"
readonly>

</td>

</tr>

</tbody>

</table>

</fieldset>

<!---------------- Bill Summary ---------------->

<fieldset>

<legend><strong>Bill Summary</strong></legend>

<div class="grid">

<label>

Taxable Amount

<input
type="number"
id="taxableAmount"
readonly>

</label>

<label>

GST Amount

<input
type="number"
id="gstAmount"
readonly>

</label>

<label>

Grand Total

<input
type="number"
id="grandTotal"
readonly>

</label>

</div>

</fieldset>

<!---------------- Notes ---------------->

<fieldset>

<legend><strong>Remarks</strong></legend>

<textarea
id="remarks"
rows="3"
placeholder="Optional Remarks"></textarea>

</fieldset>

<div class="btn">

<button
type="submit"
id="saveBill">

Save GST Bill

</button>

</div>

</form>

</div>

<script src="app.js"></script>

</body>
</html>
